name: docs

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    environment: docs
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e ".[certification,dev]"
      - name: Generate release automation pages
        run: python tools/cert/release_auto.py
      - name: Package docs artifact
        run: |
          mkdir -p .artifacts/docs
          mkdir -p .artifacts/pages
          cp README.md .artifacts/docs/
          cp -R docs .artifacts/docs/docs
          cp README.md .artifacts/pages/
          cp RELEASE_NOTES_*.md .artifacts/pages/
          cp -R docs .artifacts/pages/docs
      - name: Upload docs artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: docs-bundle
          path: .artifacts/docs
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: .artifacts/pages

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
