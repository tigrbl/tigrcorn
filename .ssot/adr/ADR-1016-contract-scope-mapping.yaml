body: |-
  # ADR 1016 - Contract scope mapping

  Decision: Scope translation shall be defined from `tigr-asgi-contract` scopes to ASGI3 scopes and extensions.

  Supported contract scope types are `http`, `websocket`, `lifespan`, and `webtransport`. ASGI3 maps standard `http`, `websocket`, and `lifespan` scopes directly. WebTransport and richer contract metadata map through documented extensions or are rejected when the selected compatibility mode cannot represent them.

  Consequences:

  - Native scope validation follows the contract package.
  - Compatibility mappings are explicit per scope type.
  - Unsupported or lossy mappings fail closed unless an operator selects a degraded compatibility mode.
