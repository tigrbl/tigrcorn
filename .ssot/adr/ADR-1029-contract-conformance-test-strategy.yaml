body: |-
  # ADR 1029 - Contract conformance test strategy

  Decision: Tigrcorn shall prove contract conformance with native-path, compatibility-path, negative, and evidence-linked tests.

  Every supported contract scope, event family, binding classification, completion level, metadata surface, and compatibility mapping needs a targeted verification unit.

  Consequences:

  - Feature rows must link to tests and evidence before support is promoted.
  - Negative tests are required for illegal mappings and unsupported capabilities.
  - Registry sync and validation are part of the proof path.
