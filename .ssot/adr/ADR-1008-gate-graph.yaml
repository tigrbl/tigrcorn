body: |-
  # ADR 1008: Release Gate Graph
  
  Status: accepted
  
  Release gates consume a machine-readable graph of claims, risks, tests, and retained evidence. Blocking risks fail closed, retained inputs must exist, and legacy unittest growth is denied outside the approved inventory.
