body: |-
  # ADR 1027 - Compatibility dispatch selection

  Decision: Tigrcorn shall select native contract or compatibility dispatch before serving application traffic.

  Detection may use configuration, app metadata, explicit wrappers, or safe introspection. Ambiguous apps fail closed unless an operator chooses a compatibility mode.

  Consequences:

  - Native and ASGI3 paths are observable as distinct dispatch modes.
  - Operators can opt into compatibility behavior intentionally.
  - App detection tests must cover native, ASGI3, ambiguous, and unsupported callables.
