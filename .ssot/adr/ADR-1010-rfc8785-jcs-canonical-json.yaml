body: |-
  # ADR 1010 - adopt RFC 8785 JCS for canonical JSON

  Decision: canonical JSON serialization work will target RFC 8785 JSON Canonicalization Scheme semantics.

  Reason: Tigrcorn stores and compares substantial machine-readable governance, conformance, and release material as JSON. A standards-based canonical form gives signatures, hashes, fixtures, and registry comparisons one deterministic byte representation instead of relying on producer-specific pretty-printing or key-order conventions.

  Consequences:

  - JCS support is tracked as an explicit planned standards feature, not implied by ordinary JSON parsing.
  - The implementation must preserve the distinction between JSON data modeling and canonical byte serialization.
  - Numeric, string, object member ordering, whitespace, and I-JSON constraints are specified in the companion SPEC rather than scattered across tests.
