body: |-
  # ADR 1019 - Unit identity model

  Decision: Tigrcorn shall propagate contract unit identifiers through dispatch, adapter, logs, and evidence.

  Unit identity links scopes, events, streams, datagrams, and emitted evidence into one traceable runtime unit. Compatibility layers must preserve the identifiers through extension metadata.

  Consequences:

  - Contract-native and ASGI3 paths can be compared by shared identity fields.
  - Observability and conformance evidence can reference stable runtime units.
  - Adapter-created identifiers must be deterministic within a connection or request lifetime.
