body: |-
  # ADR 1023 - WebTransport contract runtime

  Decision: WebTransport shall be implemented as a contract-native Tigrcorn runtime surface.

  WebTransport belongs in the native contract path because it depends on HTTP/3, QUIC streams, datagrams, session semantics, and transport metadata that ASGI3 does not standardize.

  Consequences:

  - WebTransport is not modeled as ordinary ASGI HTTP.
  - ASGI3 exposure, if present, must be extension-based and capability-gated.
  - WebTransport tests must cover streams, datagrams, session lifecycle, and metadata.
