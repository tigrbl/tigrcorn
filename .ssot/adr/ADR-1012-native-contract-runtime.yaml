body: |-
  # ADR 1012 - Native contract runtime

  Decision: Tigrcorn shall treat `tigr-asgi-contract` as its native runtime contract.

  Tigrcorn's first-class app boundary is the contract scope and event model, not ASGI3. The runtime may still host ASGI3 applications, but that support is compatibility behavior layered over the contract boundary.

  Consequences:

  - Native contract applications bypass ASGI translation.
  - Scope, event, metadata, capability, and completion semantics are governed by `tigr-asgi-contract`.
  - ASGI3 support is retained as a first-class compatibility surface, not as the normative product model.
  - ADR-1001 is superseded where it made ASGI the public runtime boundary.
