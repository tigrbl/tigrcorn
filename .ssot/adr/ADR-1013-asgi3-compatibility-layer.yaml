body: |-
  # ADR 1013 - ASGI3 compatibility layer

  Decision: Tigrcorn shall keep ASGI3 support first class through an explicit compatibility layer.

  Starlette, FastAPI, Tigrbl, and other ASGI3 apps must continue to run with Tigrcorn features available through the adapter and extension bridge.

  Consequences:

  - ASGI3 compatibility remains an in-bounds product surface.
  - The compatibility layer must preserve app behavior expected by standard ASGI3 frameworks.
  - Native contract behavior remains authoritative when ASGI and contract semantics diverge.
