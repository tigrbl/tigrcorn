body: |-
  # ADR 1026 - REST and JSON-RPC binding posture

  Decision: Tigrcorn may classify REST and JSON-RPC bindings but shall not implement them as server-owned application runtimes.

  REST and JSON-RPC sit above the server boundary. Tigrcorn can expose metadata and enforce transport-level legality, but framework behavior belongs to applications such as Starlette, FastAPI, or Tigrbl.

  Consequences:

  - REST and JSON-RPC are metadata classifications, not hosted product runtimes.
  - Compatibility adapters do not parse application protocols unless a separate feature explicitly owns that behavior.
  - Boundary docs must distinguish binding classification from application framework support.
