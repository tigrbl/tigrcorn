body: |-
  # ADR 1021 - Family capability model

  Decision: Tigrcorn shall use contract family capabilities to describe legal runtime behavior.

  Request, session, message, stream, and datagram behavior must be represented as declared capabilities rather than inferred from ad hoc protocol names.

  Consequences:

  - Runtime feature gates can validate whether a scope supports a requested family.
  - Compatibility adapters can advertise only the families they can faithfully expose.
  - Conformance tests can target family capability declarations directly.
