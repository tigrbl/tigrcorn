body: |-
  # ADR 1020 - Transport metadata model

  Decision: Tigrcorn shall expose transport and TLS metadata through `tigr-asgi-contract` metadata structures.

  Transport details such as protocol, ALPN, peer information, TLS state, and security metadata are contract fields first. ASGI3 compatibility exposes them through documented extension metadata.

  Consequences:

  - Metadata claims use one canonical model across native and compatibility paths.
  - ASGI3 apps can consume richer Tigrcorn metadata without a native rewrite.
  - Missing metadata is explicit and distinguishable from unsupported metadata.
