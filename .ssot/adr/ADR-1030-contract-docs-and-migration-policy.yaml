body: |-
  # ADR 1030 - Contract docs and migration policy

  Decision: Tigrcorn shall document the contract-native migration and compatibility policy as a governed product boundary.

  Documentation must explain native contract apps, ASGI3 compatibility, adapter activation, extension keys, unsupported mappings, and migration guidance for existing ASGI3 users.

  Consequences:

  - Public docs must align with `.ssot/registry.json`.
  - Migration guidance must not imply that ASGI3 support is being removed.
  - Compatibility caveats must be concrete and test-backed.
