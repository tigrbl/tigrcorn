body: |-
  # Emit completion semantics
  
  Tigrcorn shall model emit completion using `tigr-asgi-contract` completion levels.
  
  Requirements:
  
  - Native event emission records completion level where the contract requires it.
  - Completion metadata distinguishes buffering, flush, transport handoff, and acknowledgement semantics.
  - ASGI/3 compatibility exposes completion through extensions when standard ASGI/3 has no field.
  - Unsupported completion guarantees fail closed.
