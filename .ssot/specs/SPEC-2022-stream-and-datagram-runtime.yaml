body: |-
  # Stream and datagram runtime

  Tigrcorn shall model stream and datagram behavior as contract-native runtime families.

  Requirements:

  - Native scopes declare stream and datagram capabilities where supported.
  - Stream events preserve stream identity, direction, close state, and flow-control state.
  - Datagram events preserve unit identity, payload, and delivery semantics supported by the carrier.
  - ASGI/3 compatibility exposes these families only through documented extensions.
