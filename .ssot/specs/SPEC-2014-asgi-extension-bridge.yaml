body: |-
  # ASGI/3 extension bridge
  
  Tigrcorn shall expose contract-native metadata and capabilities to ASGI/3 apps through documented extensions.
  
  Requirements:
  
  - Extensions are namespaced under Tigrcorn-owned keys.
  - Extensions do not change standard ASGI/3 behavior for applications that ignore them.
  - Every native feature exposed to ASGI/3 has a documented extension or an explicit not-mappable decision.
  - Extension payloads preserve contract validation semantics where possible.
