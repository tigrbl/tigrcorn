body: |-
  # REST and JSON-RPC classification
  
  Tigrcorn may classify REST and JSON-RPC bindings but shall not implement them as server-owned application runtimes.
  
  Requirements:
  
  - REST and JSON-RPC binding metadata can be validated and exposed.
  - Routing, method dispatch, request body interpretation, and application errors remain application-owned.
  - ASGI/3 frameworks keep responsibility for their REST or JSON-RPC behavior.
  - Documentation distinguishes classification from runtime implementation.
