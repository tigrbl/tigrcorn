body: |-
  # Logging configuration surface

  Tigrcorn shall expose logging configuration through four governed surfaces:

  - Default configuration from `LoggingConfig`.
  - CLI flags in the public Logging / observability group.
  - TOML config under the `logging` and `metrics` blocks.
  - File-based logging profiles loaded by `logging.log_config`.

  Requirements:

  - Each supported CLI flag has a feature row.
  - Each supported logging-profile key has a feature row.
  - CLI-provided logging fields override logging-profile fields only when explicitly supplied.
  - Unsupported logging-profile keys fail closed.
  - Colorized console behavior is controlled by explicit config or TTY detection.
