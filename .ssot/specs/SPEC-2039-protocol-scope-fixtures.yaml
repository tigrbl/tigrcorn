body: |-
  # Protocol and scope fixtures

  Tigrcorn shall maintain one named fixture feature for every supported protocol and scope type.

  Requirements:

  - The fixture inventory shall be machine-readable and live in the test tree.
  - The fixture inventory shall include fixture id, feature id, surface kind, surface name, fixture path, and coverage paths.
  - Supported protocol fixtures shall cover HTTP/1.1, HTTP/2, HTTP/3, QUIC, WebSocket, WebTransport, and raw-framed/custom protocol behavior.
  - Supported scope fixtures shall cover ASGI HTTP, WebSocket, lifespan, WebTransport, and Tigrcorn custom scopes.
  - Every fixture feature shall link to this SPEC through `spec_ids`.
  - Every fixture feature shall have a pytest test row that verifies fixture presence and coverage.
  - Fixture coverage tests shall verify that fixture artifacts exist and that each fixture has at least one existing coverage path.
