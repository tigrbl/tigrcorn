body: |-
  # SSE binding posture

  Tigrcorn may classify SSE traffic through contract binding metadata without owning application-level SSE framework behavior.

  Requirements:

  - SSE classification is metadata over HTTP response streaming.
  - Transport-level streaming, flushing, and completion remain in bounds.
  - Application event formatting and business semantics remain application-owned.
  - ASGI/3 applications may consume SSE classification through extensions.
