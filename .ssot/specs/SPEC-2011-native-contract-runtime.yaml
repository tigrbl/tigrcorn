body: |-
  # Native tigr-asgi-contract runtime
  
  Tigrcorn shall use `tigr-asgi-contract` as the native application runtime contract.
  
  Requirements:
  
  - Native applications receive contract scopes and contract events.
  - Native dispatch does not require ASGI/3 translation.
  - Scope, event, binding, family, exchange, metadata, and completion validation follows `tigr-asgi-contract`.
  - ASGI/3 remains a compatibility layer, not the native contract.
  
  Exclusions:
  
  - ASGI2 is not a supported product interface.
  - WSGI is not a supported product interface.
  - RSGI is not a supported product interface.
