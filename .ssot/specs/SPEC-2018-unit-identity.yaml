body: |-
  # Contract unit identity

  Tigrcorn shall propagate contract unit identifiers through native and ASGI/3 compatibility paths.

  Requirements:

  - Request, session, message, stream, and datagram units receive stable identifiers.
  - Identifiers are preserved across event emission, logging, metrics, and evidence.
  - ASGI/3 compatibility exposes identifiers through extension metadata.
  - Adapter-created identifiers are stable for the lifetime of the associated runtime unit.
