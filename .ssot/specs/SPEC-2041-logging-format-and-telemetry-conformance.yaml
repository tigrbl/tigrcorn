body: |-
  # Logging format and telemetry conformance

  Tigrcorn shall track logging standards as separate conformance targets.

  Requirements:

  - Stdlib logging remains the substrate for application log records.
  - JSON Lines output is one valid structured record per line.
  - PEP 391 dict logging configuration is tracked independently from the existing lightweight `log_config` profile.
  - RFC 5424 syslog output is tracked as an explicit, non-default compatibility target.
  - OTEL logging support is tracked as a log data-model target, distinct from metrics and span exporters.
  - qlog support is tracked as a QUIC/HTTP3 conformance artifact target with schema and redaction rules.
spec_kind: "local-policy"
