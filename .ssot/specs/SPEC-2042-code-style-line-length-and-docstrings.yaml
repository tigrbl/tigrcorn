body: |-
  # Code style line length and docstrings

  Tigrcorn source code shall follow PEP 8 line-length guidance where practical and use spaCy-style docstrings for public, non-trivial APIs.

  Requirements:

  - Code should target 79 characters where practical.
  - Comments and docstrings should target 72 characters where practical.
  - Runtime log records and generated artifacts are not source-code lines and are governed by their own format specifications.
  - Public docstrings should use spaCy-style sections only when those sections add signal.
  - Generated or protocol-preserving text may exceed source line targets when wrapping would alter semantics or reduce traceability.
