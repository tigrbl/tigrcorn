body: |-
  ## Content
  
  # WebTransport contract target
  
  Tigrcorn shall implement first-class WebTransport support over the existing package-owned HTTP/3 and QUIC stack.
  
  ## Required target surface
  
  - Contract `webtransport` scope construction.
  - `webtransport.connect` and `webtransport.accept` session admission.
  - `webtransport.disconnect` and `webtransport.close` session termination.
  - `webtransport.stream.receive` and `webtransport.stream.send` stream events.
  - `webtransport.datagram.receive` and `webtransport.datagram.send` datagram events when QUIC DATAGRAM support is enabled.
  - `transport.emit.complete` completion signaling for session, stream, datagram, and message emission paths.
  - Contract validation against `tigr-asgi-contract` version `0.1.2`.
  - ASGI/3 exposure only through documented Tigrcorn extensions when compatibility is explicitly selected.
  
  ## Boundary exclusions
  
  Tigrcorn shall not implement REST or JSON-RPC as product runtimes. Those bindings remain application/framework responsibilities above ASGI HTTP.
  
  Tigrcorn may keep REST and JSON-RPC contract metadata visible for validation, classification, or interoperability reporting, but that metadata does not create a runtime implementation obligation.
