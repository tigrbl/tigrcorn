body: |-
  # Binding and subevent legality
  
  Tigrcorn shall validate binding, exchange, family, and subevent combinations against `tigr-asgi-contract`.
  
  Requirements:
  
  - Illegal combinations are rejected before dispatch or emission.
  - Binding metadata classification does not create application runtime ownership.
  - ASGI/3 compatibility preserves legal classification metadata where representable.
  - Negative tests cover invalid binding and subevent combinations.
