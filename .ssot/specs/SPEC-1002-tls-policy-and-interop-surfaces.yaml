body: |-
  ## Purpose
  
  This spec groups Tigrcorn's repo-local TLS and certificate-policy surfaces that are currently spread across RFC-scoped claim rows.
  
  ## Scope
  
  This spec covers the package-owned TCP/TLS 1.3 and adjacent policy surfaces that matter to current SSOT planning and registry traceability:
  
  - external peer interoperability
  - bounded stdlib backend control
  - ALPN policy
  - SNI handling
  - status request and OCSP policy
  - certificate profile material
  - X.509 path validation
  - HTTPS service identity compatibility
  - HTTPS over HTTP/1.1 and HTTP/2 TLS posture
  - QUIC TLS mapping and downstream HTTP/3 control-plane dependencies
  
  ## Requirements
  
  1. External peer interoperability claims must remain decomposed into atomic RFC-scoped rows rather than one broad correctness statement.
  2. The stdlib TLS backend, if retained, is a bounded differential control and not a replacement for the package-owned TLS claim.
  3. ALPN, SNI, OCSP or status-request behavior, certificate-profile material, and path validation must stay explicit in claim metadata and tests.
  4. Higher-level HTTPS, HTTP/2-over-TLS, QUIC-TLS, and HTTP/3 promotion-facing claims may depend on lower-level TLS rows, but must keep those dependencies visible in registry planning.
  
  ## Relationship To Standards
  
  This repo-local spec does not replace the RFC-scoped claim rows. It provides one local specification surface that explains how the TLS-related claim family is organized in Tigrcorn's SSOT material.
