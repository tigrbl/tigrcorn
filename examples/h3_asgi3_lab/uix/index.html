<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tigrcorn H3 ASGI3 Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Tigrcorn H3 ASGI3 Lab</h1>
          <p>ASGI3 over HTTP/3 on QUIC</p>
        </div>
        <output id="state" class="state">idle</output>
      </header>

      <section class="workbench">
        <div class="controls">
          <label>
            H3 request path
            <input id="path" value="/inspect?payload=hello-over-h3" />
          </label>
          <label>
            Payload
            <input id="payload" value="hello over h3" />
          </label>
          <button id="send" type="button">Send H3 Request</button>
        </div>

        <section class="readouts">
          <article>
            <h2>Request</h2>
            <pre id="session">{}</pre>
          </article>
          <article>
            <h2>Event Log</h2>
            <pre id="events"></pre>
          </article>
        </section>
      </section>
    </main>
    <script src="./main.js" type="module"></script>
  </body>
</html>
