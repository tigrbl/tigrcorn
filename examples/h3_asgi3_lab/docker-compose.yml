services:
  tigrcorn-h3-asgi3:
    build:
      context: ../..
      dockerfile: examples/h3_asgi3_lab/Dockerfile
    image: tigrcorn-h3-asgi3-lab:local
    command:
      - sh
      - -c
      - >-
        python -m examples.webtransport_mtls_demo.cert_setup --out /certs --server-name localhost &&
        tigrcorn examples.h3_asgi3_lab.app:app --app-interface asgi3
        --transport udp --host 0.0.0.0 --port 8445
        --protocol webtransport --http 3
        --ssl-certfile /certs/server-cert.pem --ssl-keyfile /certs/server-key.pem
        --webtransport-max-sessions 16 --webtransport-max-streams 128
        --webtransport-max-datagram-size 1200
        --webtransport-origin http://localhost:8091,https://localhost:8091
        --webtransport-path /wt
    ports:
      - "8445:8445/udp"
    volumes:
      - h3-asgi3-certs:/certs

  tigrcorn-h3-uix:
    build:
      context: ../..
      dockerfile: examples/h3_asgi3_lab/Dockerfile
    image: tigrcorn-h3-asgi3-lab:local
    command:
      - python
      - -m
      - examples.h3_asgi3_lab.uix_server
    ports:
      - "8091:8090/tcp"
    volumes:
      - h3-asgi3-certs:/certs
    depends_on:
      - tigrcorn-h3-asgi3

volumes:
  h3-asgi3-certs:
